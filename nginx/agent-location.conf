# Подключение агента к ОСНОВНОМУ домену ai.knus.edu.kz под-путём
# /agents/procurement/ (как course-dev, content-generator и т.д.).
#
# Блок вставляется ВНУТРЬ существующего server { listen 443 ssl; ... } основного
# домена. Отдельный server-блок/сертификат не нужен — используется TLS портала.
#
# Префикс ОБРЕЗАЕТСЯ (proxy_pass со слешем на конце): сервис видит у себя
# /, /config, /analyze, /export, /assets/... — работает «в корне».
# Если у вас принято НЕ обрезать префикс — уберите слеш после :8080 и оставьте
# ROOT_PATH=/agents/procurement в .env сервиса.

location /agents/procurement/ {
    # Внутренний адрес web-сервера, где крутится сервис (BIND_IP:8080).
    # ЗАМЕНИТЕ на реальный IP web-сервера, напр.: http://10.0.0.150:8080/
    proxy_pass http://127.0.0.1:8080/;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /agents/procurement;

    # SSE-прогресс анализа: не буферизировать и держать соединение долго.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
}

# Запрос без завершающего слеша -> добавить слеш (иначе относительные пути SPA сломаются).
location = /agents/procurement {
    return 301 /agents/procurement/;
}
