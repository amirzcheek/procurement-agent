# Развёртывание агента «Анализатор закупок» (Этап 1): единый сервис (FastAPI+React)
# + отдельная БД знаний PostgreSQL 16 с pgvector. Запуск: docker compose up -d --build
services:
  procurement:
    build:
      context: .
      args:
        # Под-путь агента на портале (слаг) и базовый адрес API (тот же слаг).
        VITE_BASE: ${VITE_BASE:-/agents/procurement/}
        VITE_API_BASE: ${VITE_API_BASE:-/agents/procurement}
        # crawl4ai+Chromium нужен только для SEARCH_PROVIDER=serper. Для gemini — false.
        INSTALL_CRAWL: ${INSTALL_CRAWL:-false}
    container_name: procurement
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    depends_on:
      procurement-db:
        condition: service_healthy
    networks:
      - platform        # доступ от Caddy/nginx портала (внешняя сеть платформы)
      - deploy_default   # доступ к своей БД знаний
    # Если LLM/OVMS на том же хосте, что и Docker:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  # Собственная БД знаний закупок. НЕ переиспользуем чужие БД. На хост не публикуется.
  procurement-db:
    image: pgvector/pgvector:pg16
    container_name: procurement-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-procurement}
      # Пароль — только из .env, в compose не хардкодим.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD не задан в .env}
      POSTGRES_DB: ${POSTGRES_DB:-procurement}
    volumes:
      - procurement_pg_data:/var/lib/postgresql/data
    networks:
      - deploy_default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-procurement} -d ${POSTGRES_DB:-procurement}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  procurement_pg_data:

networks:
  # Внешняя сеть платформы (где Caddy и web). Имя подставьте своё.
  platform:
    external: true
    name: ${PLATFORM_NETWORK:-platform}
  # Внутренняя сеть агента и его БД (наружу не публикуется).
  deploy_default:
    driver: bridge
